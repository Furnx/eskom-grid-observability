version: '3.8'

services:
  dagster_pipeline:
    build: .
    container_name: eskom_observability_pipeline
    ports:
      - "3000:3000"
    volumes:
      # Mount your local folder into the container so DuckDB data persists on your machine
      - .:/app
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home